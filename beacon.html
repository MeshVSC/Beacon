<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root,[data-theme="light"]{
  --bg:#f7f6f2;--surface:#f0efeb;--surface-2:#e8e6e1;--border:rgba(40,37,29,0.1);
  --text:#28251d;--text-muted:#7a7974;--text-faint:#bab9b4;
  --accent:#01696f;--accent-hover:#0c4e54;--accent-bg:rgba(1,105,111,0.08);
  --shadow:0 2px 8px rgba(40,37,29,0.08);--radius:10px;
}
[data-theme="dark"]{
  --bg:#111110;--surface:#1a1918;--surface-2:#232220;--border:rgba(255,255,255,0.07);
  --text:#d4d3d0;--text-muted:#6b6a68;--text-faint:#3a3937;
  --accent:#4f98a3;--accent-hover:#3d8490;--accent-bg:rgba(79,152,163,0.1);
  --shadow:0 2px 8px rgba(0,0,0,0.3);--radius:10px;
}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
.app{display:grid;grid-template-rows:56px 1fr;grid-template-columns:220px 1fr;height:100vh;overflow:hidden}
.topbar{grid-column:1/-1;display:flex;align-items:center;gap:16px;padding:0 20px;border-bottom:1px solid var(--border);background:var(--bg);z-index:10}
.sidebar{border-right:1px solid var(--border);overflow-y:auto;padding:16px 0;background:var(--surface)}
.main{overflow-y:auto;padding:24px}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.logo-name{font-size:15px;font-weight:600;letter-spacing:2px;color:var(--text);text-transform:uppercase}
.search-wrap{flex:1;max-width:420px}
.search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:13px;color:var(--text);outline:none;transition:border-color 0.15s}
.search-wrap input::placeholder{color:var(--text-faint)}
.search-wrap input:focus{border-color:var(--accent)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.count-badge{font-size:11px;color:var(--text-muted);letter-spacing:0.5px}
.theme-btn{background:none;border:1px solid var(--border);border-radius:7px;padding:5px 9px;cursor:pointer;color:var(--text-muted);font-size:13px;transition:all 0.15s}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}
.sidebar-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint);padding:0 16px 8px}
.cat-btn{display:block;width:100%;text-align:left;background:none;border:none;padding:7px 16px;font-size:13px;color:var(--text-muted);cursor:pointer;border-left:2px solid transparent;transition:all 0.12s}
.cat-btn:hover{color:var(--text);background:var(--accent-bg)}
.cat-btn.active{color:var(--accent);border-left-color:var(--accent);font-weight:500}
.cat-count{float:right;font-size:11px;color:var(--text-faint);margin-top:1px}
.table-wrap{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.section-header{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.section-title{font-size:13px;font-weight:600;letter-spacing:0.3px}
.result-count{font-size:11px;color:var(--text-muted)}
table{width:100%;border-collapse:collapse}
thead th{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-faint);font-weight:500;padding:10px 16px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface-2)}
td{padding:11px 16px;vertical-align:middle}
.td-site a{color:var(--accent);text-decoration:none;font-size:13px;font-weight:500}
.td-site a:hover{text-decoration:underline}
.td-desc{color:var(--text-muted);font-size:12px;max-width:260px}
.td-cat{font-size:11px;color:var(--text-faint)}
.badge{display:inline-block;font-size:10px;letter-spacing:0.5px;padding:2px 8px;border-radius:20px;font-weight:500}
.badge-free{background:rgba(67,122,34,0.12);color:#6daa45}
.badge-freemium{background:var(--accent-bg);color:var(--accent)}
.empty{padding:64px 20px;text-align:center;color:var(--text-muted);font-size:13px}
</style>
</head>

const catCountMap = {
  'AI & Multi-Model':'cnt-AI','Automation':'cnt-Auto','Design & Image':'cnt-Design',
  'Video & Animation':'cnt-Video','Website & App Builders':'cnt-Web','Coding & Dev':'cnt-Code',
  'PDF & Documents':'cnt-PDF','Audio & Music':'cnt-Audio','Home & Interior':'cnt-Home',
  'Travel & Geography':'cnt-Travel','Learning & Productivity':'cnt-Learn','Utilities':'cnt-Util'
};
Object.entries(catCountMap).forEach(([cat,id])=>{
  const el=document.getElementById(id);
  if(el) el.textContent=TOOLS.filter(t=>t.category===cat).length;
});
let currentCat='All',currentSearch='';
function pricingBadge(p){
  if(p==='Free') return '<span class="badge badge-free">Free</span>';
  return '<span class="badge badge-freemium">Freemium</span>';
}
function render(){
  let f=TOOLS;
  if(currentCat!=='All') f=f.filter(t=>t.category===currentCat);
  if(currentSearch){const q=currentSearch.toLowerCase();f=f.filter(t=>t.domain.toLowerCase().includes(q)||t.description.toLowerCase().includes(q)||t.category.toLowerCase().includes(q));}
  const tbody=document.getElementById('table-body');
  const empty=document.getElementById('empty');
  document.getElementById('result-count').textContent=f.length+' result'+(f.length!==1?'s':'');
  document.getElementById('section-title').textContent=currentCat==='All'?'All Tools':currentCat;
  if(!f.length){tbody.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  tbody.innerHTML=f.map(t=>`<tr><td class="td-site"><a href="${t.url}" target="_blank" rel="noopener noreferrer">${t.domain}</a></td><td class="td-desc">${t.description}</td><td class="td-cat">${t.category}</td><td>${pricingBadge(t.pricing)}</td></tr>`).join('');
}
document.querySelectorAll('.cat-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentCat=btn.dataset.cat;
    render();
  });
});
document.getElementById('search').addEventListener('input',e=>{currentSearch=e.target.value.trim();render();});
const root=document.documentElement;
const toggleBtn=document.getElementById('theme-toggle');
let theme='dark';
toggleBtn.addEventListener('click',()=>{
  theme=theme==='dark'?'light':'dark';
  root.setAttribute('data-theme',theme);
  toggleBtn.textContent=theme==='dark'?'☀':'☾';
});
render();
</script>
